version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    # 환경 변수 설정
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge